<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Pro Rats</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:radial-gradient(circle,#0f0f0f,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}
.container{text-align:center;}
h1{color:#00ff88;text-shadow:0 0 20px #00ff88;}
.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px;
    font-size:20px;
    align-items:center;
}
#musicToggle{
    cursor:pointer;font-size:22px;user-select:none;
    background:none;border:none;color:white;padding:0;
}
canvas{
    background:#000;
    border:2px solid #00ff88;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,255,136,0.4),0 0 70px rgba(0,255,136,0.2);
    width:90vmin;height:90vmin;
}
button.main-btn{
    margin-top:10px;padding:12px 25px;border:none;border-radius:10px;
    background:#00ff88;color:black;font-weight:bold;cursor:pointer;font-size:16px;
}
button.main-btn:hover{transform:scale(1.05);}

/* PANTALLA INICIO */
#startScreen{
    position:fixed;inset:0;background:black;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    z-index:1000;gap:16px;
}
#startScreen h1{font-size:40px;}

/* PANTALLA GAME OVER */
#gameOverScreen{
    position:fixed;inset:0;background:rgba(0,0,0,0.95);
    display:none;flex-direction:column;justify-content:center;align-items:center;
    z-index:1000;gap:10px;padding:20px;
}
#gameOverScreen h1{color:red;font-size:clamp(28px,8vw,50px);}

/* PANTALLA RANKING */
#rankingScreen{
    position:fixed;inset:0;background:rgba(0,0,0,0.97);
    display:none;flex-direction:column;justify-content:center;align-items:center;
    z-index:1001;gap:12px;padding:20px;
}
#rankingScreen h2{color:#00ff88;font-size:28px;text-shadow:0 0 15px #00ff88;}
#rankingTable{width:100%;max-width:380px;}
#rankingTable table{width:100%;border-collapse:collapse;}
#rankingTable th{color:#00ff88;padding:8px;border-bottom:1px solid #00ff88;font-size:14px;}
#rankingTable td{padding:8px;text-align:center;font-size:14px;border-bottom:1px solid #222;}
#rankingTable tr:nth-child(2) td{color:gold;font-weight:bold;}
#rankingTable tr:nth-child(3) td{color:silver;}
#rankingTable tr:nth-child(4) td{color:#cd7f32;}

/* PANTALLA NOMBRE */
#nameScreen{
    position:fixed;inset:0;background:rgba(0,0,0,0.97);
    display:none;flex-direction:column;justify-content:center;align-items:center;
    z-index:1002;gap:16px;
}
#nameScreen h2{color:#00ff88;font-size:26px;}
#nameScreen p{color:#888;font-size:14px;}
#nameInput{
    padding:12px 20px;border-radius:10px;border:2px solid #00ff88;
    background:#111;color:white;font-size:18px;text-align:center;width:260px;outline:none;
}
.btn-row{display:flex;gap:12px;}

/* CONTROLES MÓVIL */
.controls{
    margin-top:10px;display:none;
    justify-content:center;align-items:center;flex-direction:column;gap:10px;
}
.controls .row{display:flex;gap:10px;}
.controls button{
    width:65px;height:65px;font-size:22px;border-radius:12px;
    background:#00ff88;border:none;color:black;font-weight:bold;cursor:pointer;
}
@media(max-width:768px){.controls{display:flex;}}
</style>
</head>
<body>

<!-- Pantalla nombre (z-index más alto) -->
<div id="nameScreen">
    <h2>🏆 NUEVO RÉCORD</h2>
    <p>¡Entra en el Top 10! ¿Cómo te llamas?</p>
    <input id="nameInput" type="text" maxlength="16" placeholder="Tu nombre..." autocomplete="off"/>
    <div class="btn-row">
        <button class="main-btn" onclick="submitScore()">GUARDAR</button>
        <button class="main-btn" style="background:#555;color:white;" onclick="skipScore()">SALTAR</button>
    </div>
</div>

<!-- Pantalla ranking -->
<div id="rankingScreen">
    <h2>🏆 TOP 10 GLOBAL</h2>
    <div id="rankingTable"><p style="color:#888;">Cargando...</p></div>
    <button class="main-btn" onclick="closeRanking()">CERRAR</button>
</div>

<!-- Pantalla inicio -->
<div id="startScreen">
    <h1>🐍 SNAKE PRO RATS 🐀</h1>
    <button class="main-btn" onclick="startGame()">JUGAR</button>
    <button class="main-btn" style="background:#1a1a2e;color:#00ff88;border:1px solid #00ff88;" onclick="showRanking()">🏆 RANKING</button>
</div>

<!-- Pantalla game over -->
<div id="gameOverScreen">
    <h1>💀 GAME OVER</h1>
    <div id="finalScore" style="font-size:22px;"></div>
    <button class="main-btn" onclick="startGame()">REINTENTAR</button>
    <button class="main-btn" style="background:#1a1a2e;color:#00ff88;border:1px solid #00ff88;" onclick="showRanking()">🏆 RANKING</button>
</div>

<div class="container">
    <h1>Snake Pro Rats</h1>
    <div class="stats">
        <div>🏆 Score: <span id="score">0</span></div>
        <div>⭐ Récord: <span id="best">0</span></div>
        <button id="musicToggle" onclick="toggleMusic()" title="Silenciar / Activar música">🔊</button>
    </div>
    <canvas id="game"></canvas>
    <br>
    <div class="controls">
        <div class="row"><button onclick="setDir('up')">⬆️</button></div>
        <div class="row">
            <button onclick="setDir('left')">⬅️</button>
            <button onclick="setDir('down')">⬇️</button>
            <button onclick="setDir('right')">➡️</button>
        </div>
    </div>
</div>

<script>
/* ===== SUPABASE CONFIG ===== */
const SUPABASE_URL = "https://duegllzmzbhxjqjwqswd.supabase.co";
const SUPABASE_KEY = "sb_publishable_EEVHGljg4xbAV3pwG7I27g_x7QR6LB3";

async function getTopScores(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=nombre,puntuacion&order=puntuacion.desc&limit=10`, {
        headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    return await res.json();
}
async function saveScore(nombre, puntuacion){
    await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
        method:"POST",
        headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"},
        body: JSON.stringify({nombre, puntuacion})
    });
}
async function isTopScore(puntuacion){
    const scores = await getTopScores();
    if(scores.length < 10) return true;
    return puntuacion > scores[scores.length-1].puntuacion;
}

/* ===== RANKING UI ===== */
let rankingFrom = "start"; // "start" o "gameover"

async function showRanking(){
    // Guardar desde dónde se abre
    if(document.getElementById("gameOverScreen").style.display === "flex"){
        rankingFrom = "gameover";
    } else {
        rankingFrom = "start";
    }
    document.getElementById("rankingScreen").style.display = "flex";
    document.getElementById("rankingTable").innerHTML = "<p style='color:#888;'>Cargando...</p>";
    const scores = await getTopScores();
    if(!scores || scores.length === 0){
        document.getElementById("rankingTable").innerHTML = "<p style='color:#888;'>Aún no hay puntuaciones. ¡Sé el primero!</p>";
        return;
    }
    const medals = ["🥇","🥈","🥉"];
    let html = "<table><tr><th>#</th><th>Nombre</th><th>Puntuación</th></tr>";
    scores.forEach((s,i) => {
        html += `<tr><td>${medals[i]||(i+1)}</td><td>${s.nombre}</td><td>${s.puntuacion}</td></tr>`;
    });
    html += "</table>";
    document.getElementById("rankingTable").innerHTML = html;
}

function closeRanking(){
    document.getElementById("rankingScreen").style.display = "none";
    // Volver a la pantalla correcta
    if(rankingFrom === "gameover"){
        document.getElementById("gameOverScreen").style.display = "flex";
    } else {
        document.getElementById("startScreen").style.display = "flex";
    }
}

let pendingScore = 0;

async function checkAndPromptScore(){
    if(score > 0){
        try {
            const top = await isTopScore(score);
            if(top){
                pendingScore = score;
                document.getElementById("nameInput").value = "";
                document.getElementById("nameScreen").style.display = "flex";
                return;
            }
        } catch(e) {
            pendingScore = score;
            document.getElementById("nameInput").value = "";
            document.getElementById("nameScreen").style.display = "flex";
            return;
        }
    }
    document.getElementById("gameOverScreen").style.display = "flex";
}
async function submitScore(){
    const nombre = document.getElementById("nameInput").value.trim();
    if(!nombre) return;
    document.getElementById("nameScreen").style.display = "none";
    await saveScore(nombre, pendingScore);
    document.getElementById("gameOverScreen").style.display = "flex";
}
function skipScore(){
    document.getElementById("nameScreen").style.display = "none";
    document.getElementById("gameOverScreen").style.display = "flex";
}

/* ===== CANVAS ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScoreEl = document.getElementById("finalScore");
const GRID_CELLS = 20;
let gridSize;

function resize(){
    let s = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    canvas.width = s; canvas.height = s; gridSize = s / GRID_CELLS;
}
resize();
window.addEventListener("resize", resize);

let snake, food, rat, dx, dy, nextDir;
let score, best, step, acc, lastTime, running;
best = parseInt(localStorage.getItem("snakeBestPro") || "0");
bestEl.innerText = best;
running = false;

/* ===== AUDIO ===== */
const AC = new (window.AudioContext || window.webkitAudioContext)();
let musicMuted = false, masterGainNode = null, musicRunning = false;

function toggleMusic(){
    musicMuted = !musicMuted;
    document.getElementById("musicToggle").textContent = musicMuted ? "🔇" : "🔊";
    if(masterGainNode) masterGainNode.gain.value = musicMuted ? 0 : 0.08;
}
function startMusic(){
    stopMusic(); musicRunning = true;
    masterGainNode = AC.createGain();
    masterGainNode.gain.value = musicMuted ? 0 : 0.08;
    masterGainNode.connect(AC.destination);
    const bassNotes=[55,55,65.41,55], arpNotes=[220,261.63,329.63,392,329.63,261.63,220,196], beat=60/128;
    function scheduleBass(t,idx){
        if(!musicRunning) return;
        const osc=AC.createOscillator(),g=AC.createGain();
        osc.type="sawtooth"; osc.frequency.value=bassNotes[idx%bassNotes.length];
        g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.01,t+beat*1.8);
        osc.connect(g); g.connect(masterGainNode); osc.start(t); osc.stop(t+beat*2);
        setTimeout(()=>scheduleBass(t+beat*2,idx+1), Math.max(0,(t-AC.currentTime+beat*2)*1000-60));
    }
    function scheduleArp(t,idx){
        if(!musicRunning) return;
        const osc=AC.createOscillator(),g=AC.createGain();
        osc.type="square"; osc.frequency.value=arpNotes[idx%arpNotes.length];
        g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.01,t+beat*0.45);
        osc.connect(g); g.connect(masterGainNode); osc.start(t); osc.stop(t+beat*0.5);
        setTimeout(()=>scheduleArp(t+beat*0.5,idx+1), Math.max(0,(t-AC.currentTime+beat*0.5)*1000-60));
    }
    const now=AC.currentTime+0.1; scheduleBass(now,0); scheduleArp(now,0);
}
function stopMusic(){ musicRunning=false; masterGainNode=null; }
function playEat(){
    const t=AC.currentTime;
    [440,520,660].forEach((freq,i)=>{
        const osc=AC.createOscillator(),g=AC.createGain(); osc.type="sine"; osc.frequency.value=freq;
        const st=t+i*0.04; g.gain.setValueAtTime(0.4,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.12);
        osc.connect(g); g.connect(AC.destination); osc.start(st); osc.stop(st+0.13);
    });
}
function playRat(){
    const t=AC.currentTime;
    [300,450,600,750].forEach((freq,i)=>{
        const osc=AC.createOscillator(),g=AC.createGain(); osc.type="triangle"; osc.frequency.value=freq;
        const st=t+i*0.05; g.gain.setValueAtTime(0.5,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.1);
        osc.connect(g); g.connect(AC.destination); osc.start(st); osc.stop(st+0.12);
    });
}
function playImpact(){
    const t=AC.currentTime;
    const buf=AC.createBuffer(1,AC.sampleRate*0.6,AC.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.15));
    const src=AC.createBufferSource(),filter=AC.createBiquadFilter(),gNoise=AC.createGain();
    filter.type="lowpass"; filter.frequency.value=400;
    src.buffer=buf; src.connect(filter); filter.connect(gNoise); gNoise.connect(AC.destination);
    gNoise.gain.setValueAtTime(1.2,t); gNoise.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    src.start(t); src.stop(t+0.6);
    [100,80,60].forEach((freq,i)=>{
        const osc=AC.createOscillator(),g=AC.createGain(); osc.type="sine"; osc.frequency.value=freq;
        const st=t+i*0.05; g.gain.setValueAtTime(0.6,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.5);
        osc.connect(g); g.connect(AC.destination); osc.start(st); osc.stop(t+0.65);
    });
}

/* ===== JUEGO ===== */
function spawnFood(){ food={x:Math.floor(Math.random()*GRID_CELLS),y:Math.floor(Math.random()*GRID_CELLS)}; }
function spawnRat(){ rat=Math.random()<0.35?{x:Math.floor(Math.random()*GRID_CELLS),y:Math.floor(Math.random()*GRID_CELLS)}:null; }
function updateScore(){
    scoreEl.innerText=score;
    if(score>best){ best=score; localStorage.setItem("snakeBestPro",best); bestEl.innerText=best; }
}
function startGame(){
    if(AC.state==="suspended") AC.resume();
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameOverScreen").style.display="none";
    document.getElementById("rankingScreen").style.display="none";
    snake=[{x:10,y:10}]; dx=1; dy=0; nextDir={x:1,y:0};
    score=0; step=140; acc=0; lastTime=0; running=true;
    spawnFood(); spawnRat(); updateScore(); startMusic();
    requestAnimationFrame(loop);
}
function setDir(d){
    if(d==="up"&&dy===0) nextDir={x:0,y:-1};
    if(d==="down"&&dy===0) nextDir={x:0,y:1};
    if(d==="left"&&dx===0) nextDir={x:-1,y:0};
    if(d==="right"&&dx===0) nextDir={x:1,y:0};
}
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"){e.preventDefault();setDir("up");}
    if(e.key==="ArrowDown"){e.preventDefault();setDir("down");}
    if(e.key==="ArrowLeft"){e.preventDefault();setDir("left");}
    if(e.key==="ArrowRight"){e.preventDefault();setDir("right");}
});
function move(){
    dx=nextDir.x; dy=nextDir.y;
    const head={x:snake[0].x+dx,y:snake[0].y+dy};
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
        score++; playEat(); spawnFood(); spawnRat(); if(step>70) step-=1.2;
    } else if(rat&&head.x===rat.x&&head.y===rat.y){
        score+=3; playRat(); spawnRat();
    } else { snake.pop(); }
}
function crash(){
    const h=snake[0];
    return h.x<0||h.y<0||h.x>=GRID_CELLS||h.y>=GRID_CELLS||snake.slice(1).some(s=>s.x===h.x&&s.y===h.y);
}
function loop(time){
    if(!running) return;
    requestAnimationFrame(loop);
    if(!lastTime) lastTime=time;
    acc+=time-lastTime; lastTime=time;
    while(acc>=step){
        move();
        if(crash()){
            running=false; stopMusic(); playImpact();
            finalScoreEl.innerText="Score: "+score;
            checkAndPromptScore();
            return;
        }
        acc-=step;
    }
    draw();
}
/* ===== HELPERS GRÁFICOS REALISTAS ===== */

// Ángulo de una dirección dx,dy en radianes
function angOf(dx,dy){ return Math.atan2(dy,dx); }

// Dibuja una manzana 3D con brillo especular, sombra de contacto, tallo y hoja
function drawApple(cx,cy,r,pulse){
    const R=r+pulse;
    // sombra de contacto en el suelo
    ctx.save();
    ctx.shadowBlur=0;
    ctx.fillStyle="rgba(0,0,0,0.45)";
    ctx.beginPath();
    ctx.ellipse(cx,cy+R*0.85,R*0.9,R*0.32,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // glow ambiental
    ctx.save();
    ctx.shadowBlur=18; ctx.shadowColor="#ff2d2d";

    // cuerpo: gradiente radial desplazado para dar volumen esférico
    const grad=ctx.createRadialGradient(cx-R*0.35,cy-R*0.4,R*0.15,cx,cy,R*1.15);
    grad.addColorStop(0,"#ff8a7a");
    grad.addColorStop(0.35,"#ff3b30");
    grad.addColorStop(0.75,"#c2160f");
    grad.addColorStop(1,"#7a0a06");
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(cx,cy,R,R*0.96,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // sombra interna lateral (lado opuesto a la luz)
    ctx.save();
    ctx.shadowBlur=0;
    ctx.globalAlpha=0.35;
    const shGrad=ctx.createRadialGradient(cx+R*0.5,cy+R*0.4,0,cx+R*0.5,cy+R*0.4,R*1.1);
    shGrad.addColorStop(0,"#3d0905");
    shGrad.addColorStop(1,"rgba(61,9,5,0)");
    ctx.fillStyle=shGrad;
    ctx.beginPath();
    ctx.ellipse(cx,cy,R,R*0.96,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // brillo especular
    ctx.save();
    ctx.globalAlpha=0.85;
    ctx.fillStyle="#ffffff";
    ctx.beginPath();
    ctx.ellipse(cx-R*0.38,cy-R*0.42,R*0.28,R*0.16,-0.5,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // tallo
    ctx.save();
    ctx.strokeStyle="#5a3a1e";
    ctx.lineWidth=Math.max(1.5,R*0.18);
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(cx+R*0.05,cy-R*0.85);
    ctx.quadraticCurveTo(cx+R*0.25,cy-R*1.25,cx+R*0.15,cy-R*1.45);
    ctx.stroke();
    ctx.restore();

    // hoja
    ctx.save();
    ctx.fillStyle="#3baa3b";
    ctx.beginPath();
    ctx.ellipse(cx+R*0.42,cy-R*1.18,R*0.32,R*0.16,0.6,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="#2a7a2a";
    ctx.lineWidth=0.6;
    ctx.stroke();
    ctx.restore();
}

// Dibuja una rata 3D: cuerpo ovoide con sombreado, cabeza, orejas, cola y patas
function drawRatSprite(cx,cy,r,pulse,t){
    const R=r+pulse;
    const wiggle=Math.sin(t/90)*0.15;

    ctx.save();
    ctx.shadowBlur=0;
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.beginPath();
    ctx.ellipse(cx,cy+R*0.75,R*1.3,R*0.4,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur=10; ctx.shadowColor="#888";

    // cola
    ctx.strokeStyle="#c98a8a";
    ctx.lineWidth=Math.max(1.2,R*0.14);
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(cx-R*0.9,cy+R*0.1);
    ctx.quadraticCurveTo(cx-R*1.6,cy+R*0.5+wiggle*R,cx-R*2.1,cy-R*0.1);
    ctx.stroke();

    // cuerpo (gradiente para volumen)
    const bodyGrad=ctx.createRadialGradient(cx-R*0.2,cy-R*0.35,R*0.1,cx,cy,R*1.3);
    bodyGrad.addColorStop(0,"#e0e0e0");
    bodyGrad.addColorStop(0.5,"#aaaaaa");
    bodyGrad.addColorStop(1,"#5a5a5a");
    ctx.fillStyle=bodyGrad;
    ctx.beginPath();
    ctx.ellipse(cx,cy,R*1.05,R*0.85,0,0,Math.PI*2);
    ctx.fill();

    // sombra de contacto inferior del cuerpo
    ctx.save();
    ctx.globalAlpha=0.3;
    const us=ctx.createRadialGradient(cx+R*0.3,cy+R*0.4,0,cx+R*0.3,cy+R*0.4,R*1.1);
    us.addColorStop(0,"#1a1a1a");
    us.addColorStop(1,"rgba(26,26,26,0)");
    ctx.fillStyle=us;
    ctx.beginPath();
    ctx.ellipse(cx,cy,R*1.05,R*0.85,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // cabeza
    const headX=cx+R*0.95, headY=cy-R*0.05;
    const headGrad=ctx.createRadialGradient(headX-R*0.15,headY-R*0.2,R*0.05,headX,headY,R*0.65);
    headGrad.addColorStop(0,"#e8e8e8");
    headGrad.addColorStop(1,"#999999");
    ctx.fillStyle=headGrad;
    ctx.beginPath();
    ctx.ellipse(headX,headY,R*0.55,R*0.45,0,0,Math.PI*2);
    ctx.fill();

    // orejas
    ctx.fillStyle="#d99a9a";
    ctx.beginPath();
    ctx.ellipse(headX+R*0.15,headY-R*0.45,R*0.22,R*0.26,0.3,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX-R*0.25,headY-R*0.42,R*0.2,R*0.24,-0.3,0,Math.PI*2);
    ctx.fill();

    // hocico y nariz
    ctx.fillStyle="#ddd";
    ctx.beginPath();
    ctx.ellipse(headX+R*0.55,headY+R*0.1,R*0.2,R*0.14,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#ff6fa3";
    ctx.beginPath();
    ctx.arc(headX+R*0.72,headY+R*0.1,R*0.08,0,Math.PI*2);
    ctx.fill();

    // ojo
    ctx.fillStyle="#111";
    ctx.beginPath();
    ctx.arc(headX+R*0.15,headY-R*0.05,R*0.09,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(headX+R*0.18,headY-R*0.08,R*0.03,0,Math.PI*2);
    ctx.fill();

    // patitas
    ctx.fillStyle="#999";
    [[-R*0.5,R*0.6],[R*0.3,R*0.65]].forEach(p=>{
        ctx.beginPath();
        ctx.ellipse(cx+p[0],cy+p[1],R*0.16,R*0.1,0,0,Math.PI*2);
        ctx.fill();
    });

    ctx.restore();
}

function draw(){
    const t=Date.now();
    ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle="rgba(255,255,255,0.05)";
    for(let i=0;i<canvas.width;i+=gridSize){
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
    }
    const pulse=Math.sin(t/120)*2;

    // comida realista
    drawApple(food.x*gridSize+gridSize/2, food.y*gridSize+gridSize/2, gridSize*0.4, pulse*0.3);

    // rata realista
    if(rat){
        drawRatSprite(rat.x*gridSize+gridSize/2, rat.y*gridSize+gridSize/2, gridSize*0.42, pulse*0.2, t);
    }

    drawSnake(t);
    updateScore();
}

/* ===== SERPIENTE 3D CON ESCAMAS ===== */
function drawSnake(t){
    const n=snake.length;
    if(n===0) return;

    // Centros de cada segmento en píxeles
    const pts=snake.map(s=>({x:s.x*gridSize+gridSize/2, y:s.y*gridSize+gridSize/2}));

    // Ángulo de orientación de cada segmento, mirando hacia delante (hacia el segmento anterior en el array)
    const angles=new Array(n);
    for(let i=0;i<n;i++){
        if(i<n-1){
            angles[i]=angOf(pts[i].x-pts[i+1].x, pts[i].y-pts[i+1].y);
        } else {
            angles[i]=angles[i-1]!==undefined?angles[i-1]:0;
        }
    }

    const baseR=gridSize*0.52;

    ctx.save();
    ctx.shadowBlur=14; ctx.shadowColor="#00ff88";

    // ---- Cuerpo: dibujar de cola a cabeza para que la cabeza quede por encima ----
    for(let i=n-1;i>=1;i--){
        const p=pts[i];
        const ang=angles[i];
        // el cuerpo se afina ligeramente hacia la cola
        const taper=0.65+0.35*(1-i/n);
        const r=baseR*taper;

        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(ang);

        // sombra de contacto bajo el segmento
        ctx.save();
        ctx.shadowBlur=0;
        ctx.fillStyle="rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(0,r*0.55,r*0.95,r*0.32,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();

        // cuerpo cilíndrico: gradiente vertical (luz arriba, sombra abajo)
        const grad=ctx.createLinearGradient(0,-r,0,r);
        grad.addColorStop(0,"#8dffce");
        grad.addColorStop(0.35,"#00e07a");
        grad.addColorStop(0.7,"#00a85c");
        grad.addColorStop(1,"#005c33");
        ctx.fillStyle=grad;
        ctx.beginPath();
        ctx.ellipse(0,0,r,r*0.95,0,0,Math.PI*2);
        ctx.fill();

        // patrón de escamas: filas de óvalos solapados con su propio sombreado, recortado al cuerpo
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(0,0,r,r*0.95,0,0,Math.PI*2);
        ctx.clip();
        const scaleRows=3;
        const rowH=(r*1.9)/scaleRows;
        for(let rowI=0;rowI<scaleRows;rowI++){
            const yOff=-r*0.95+rowH*rowI+rowH/2;
            const offset=(rowI%2===0)?0:r*0.35;
            const scaleW=r*0.7;
            for(let sx=-r*1.4+offset; sx<r*1.4; sx+=scaleW*0.9){
                const sg=ctx.createRadialGradient(sx-scaleW*0.15,yOff-rowH*0.15,scaleW*0.05,sx,yOff,scaleW*0.5);
                sg.addColorStop(0,"rgba(255,255,255,0.22)");
                sg.addColorStop(0.5,"rgba(255,255,255,0.03)");
                sg.addColorStop(1,"rgba(0,40,20,0.25)");
                ctx.fillStyle=sg;
                ctx.beginPath();
                ctx.ellipse(sx,yOff,scaleW*0.5,rowH*0.46,0,0,Math.PI*2);
                ctx.fill();
            }
        }
        ctx.restore();

        // línea dorsal sutil (lomo más claro)
        ctx.save();
        ctx.globalAlpha=0.25;
        ctx.fillStyle="#ffffff";
        ctx.beginPath();
        ctx.ellipse(0,-r*0.45,r*0.85,r*0.18,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();

        ctx.restore();
    }

    // ---- Cabeza ----
    {
        const p=pts[0];
        const ang=angles[0];
        const r=baseR*1.08;

        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(ang);

        // sombra de contacto
        ctx.save();
        ctx.shadowBlur=0;
        ctx.fillStyle="rgba(0,0,0,0.32)";
        ctx.beginPath();
        ctx.ellipse(0,r*0.6,r*1.05,r*0.34,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();

        // lengua (parpadeo periódico)
        if(Math.sin(t/250)>0.4){
            ctx.save();
            ctx.strokeStyle="#ff3b6e";
            ctx.lineWidth=Math.max(1,r*0.07);
            ctx.lineCap="round";
            ctx.beginPath();
            ctx.moveTo(r*0.95,0);
            ctx.lineTo(r*1.45,0);
            ctx.moveTo(r*1.45,0);
            ctx.lineTo(r*1.65,-r*0.18);
            ctx.moveTo(r*1.45,0);
            ctx.lineTo(r*1.65,r*0.18);
            ctx.stroke();
            ctx.restore();
        }

        // forma de la cabeza con gradiente de volumen
        const headGrad=ctx.createRadialGradient(-r*0.2,-r*0.35,r*0.1,0,0,r*1.3);
        headGrad.addColorStop(0,"#baffe0");
        headGrad.addColorStop(0.4,"#00e07a");
        headGrad.addColorStop(0.8,"#00a85c");
        headGrad.addColorStop(1,"#005c33");
        ctx.fillStyle=headGrad;
        ctx.beginPath();
        ctx.ellipse(0,0,r,r*0.92,0,0,Math.PI*2);
        ctx.fill();

        // escamas suaves en la cabeza
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(0,0,r,r*0.92,0,0,Math.PI*2);
        ctx.clip();
        for(let rowI=0;rowI<2;rowI++){
            const yOff=-r*0.5+rowI*r*0.55;
            for(let sx=-r*0.7;sx<r*1.1;sx+=r*0.5){
                const sg=ctx.createRadialGradient(sx-r*0.08,yOff-r*0.08,r*0.02,sx,yOff,r*0.3);
                sg.addColorStop(0,"rgba(255,255,255,0.18)");
                sg.addColorStop(1,"rgba(0,40,20,0.2)");
                ctx.fillStyle=sg;
                ctx.beginPath();
                ctx.ellipse(sx,yOff,r*0.28,r*0.24,0,0,Math.PI*2);
                ctx.fill();
            }
        }
        ctx.restore();

        // ojos (a ambos lados, ligeramente hacia delante) con pupila vertical de reptil
        [-1,1].forEach(side=>{
            ctx.fillStyle="#0a2e1c";
            ctx.beginPath();
            ctx.ellipse(r*0.25,side*r*0.42,r*0.16,r*0.2,0,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#000";
            ctx.beginPath();
            ctx.ellipse(r*0.3,side*r*0.42,r*0.05,r*0.16,0,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="rgba(255,255,255,0.8)";
            ctx.beginPath();
            ctx.arc(r*0.2,side*r*0.36,r*0.045,0,Math.PI*2);
            ctx.fill();
        });

        // fosas nasales
        ctx.fillStyle="#004d2b";
        [-1,1].forEach(side=>{
            ctx.beginPath();
            ctx.arc(r*0.85,side*r*0.12,r*0.04,0,Math.PI*2);
            ctx.fill();
        });

        ctx.restore();
    }

    ctx.restore();
}
</script>
